name: steam_analytics
version: 1.0.0
config-version: 2

profile: steam_analytics

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  steam_analytics:
    staging:
      +schema: "{{ env_var('DBT_BIGQUERY_STAGING_DATASET', 'steam_staging') }}"
      +materialized: view
    marts:
      +schema: "{{ env_var('DBT_BIGQUERY_DATASET', 'steam_gold') }}"
      +materialized: table
