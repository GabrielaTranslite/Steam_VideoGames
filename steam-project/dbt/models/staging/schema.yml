version: 2

models:
  - name: stg_steam_api
    description: Latest Steam API record per appid.
    columns:
      - name: appid
        data_tests:
          - not_null
          - unique

  - name: stg_steamspy
    description: Latest SteamSpy record per appid.
    columns:
      - name: appid
        data_tests:
          - not_null
          - unique
      - name: title
        data_tests:
          - not_null

  - name: stg_languages
    description: Distinct app-language rows from normalized silver table.
    columns:
      - name: appid
        data_tests:
          - not_null
      - name: language
        data_tests:
          - not_null
