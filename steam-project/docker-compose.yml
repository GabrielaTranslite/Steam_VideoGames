version: '3.8'

services:
  # Postgres jako baza metadanych dla Airflow
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  # Airflow Webserver
  airflow-webserver:
    build: . # Używamy lokalnego Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
      AIRFLOW__WEBSERVER__SECRET_KEY: '${SECRET_KEY}'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '${FERNET_KEY}' # <--- Pamiętaj, aby WSTAWIĆ SWÓJ KLUCZ!
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/credentials.json
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: '/opt/airflow/logs' # Upewniamy się, że to jest ścieżka do woluminu
      AIRFLOW__LOGGING__REMOTE_LOGGING: 'False' # Jawnie wyłączamy zdalne logowanie
      AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: '' # Upewniamy się, że to jest puste
      AIRFLOW__LOGGING__LOG_PROCESSOR_LOG_HANDLER: 'file' # Logi mają być zapisywane do plików
      AIRFLOW__LOGGING__TASK_HANDLER: 'airflow.utils.log.file_task_handler.FileTaskHandler' # Użyj file handlera
      AIRFLOW__WEBSERVER__LOG_FETCH_CRITERIA: 'file' # Webserver ma preferować czytanie logów z plików
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '120' # Zwiększ timeout, czasem UI potrzebuje więcej czasu
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./gcp:/opt/airflow/gcp
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  # Airflow Scheduler
  airflow-scheduler:
    build: . # Używamy lokalnego Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
      AIRFLOW__WEBSERVER__SECRET_KEY: '${SECRET_KEY}'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '${FERNET_KEY}'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/credentials.json
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: '/opt/airflow/logs' # Upewniamy się, że to jest ścieżka do woluminu
      AIRFLOW__LOGGING__REMOTE_LOGGING: 'False' # Jawnie wyłączamy zdalne logowanie
      AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: '' # Upewniamy się, że to jest puste
      AIRFLOW__LOGGING__LOG_PROCESSOR_LOG_HANDLER: 'file' # Logi mają być zapisywane do plików
      AIRFLOW__LOGGING__TASK_HANDLER: 'airflow.utils.log.file_task_handler.FileTaskHandler' # Użyj file handlera
      AIRFLOW__WEBSERVER__LOG_FETCH_CRITERIA: 'file' # Webserver ma preferować czytanie logów z plików
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '120' # Zwiększ timeout, czasem UI potrzebuje więcej czasu 
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./gcp:/opt/airflow/gcp
      - ./logs:/opt/airflow/logs
    command: scheduler
    restart: always

volumes:
  postgres_db_volume:
  logs:
